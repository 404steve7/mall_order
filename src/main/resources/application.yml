spring:
  application:
    name: mall-order-demo
  profiles:
    include: local
  data:
    redis:
      host:localhost
      port:6379
      timeout:3s
rocketmq:
  name-server: localhost:9876
  producer:
    group: mall-order-producer-group

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true